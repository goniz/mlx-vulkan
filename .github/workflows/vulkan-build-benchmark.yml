name: Vulkan Build and Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vulkan-build-benchmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-benchmark:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: [strix-halo, vulkan]
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize MLX submodules
        run: |
          git submodule init mlx mlx-lm
          git submodule update mlx mlx-lm

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Initialize virtual environment
        run: ./dev.sh init-venv

      - name: Build the code
        run: ./dev.sh build

      - name: Run generate validation
        run: ./dev.sh generate --prompt "Hello, how are you?" --max-tokens 10

      - name: Run benchmarks, model report, and update history
        run: ./dev.sh update-benchmark

      - name: Commit benchmark results
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md benchmarks/README.md benchmarks/results.csv benchmarks/model_generation_report.json benchmarks/prompt_tps.svg benchmarks/generation_tps.svg benchmarks/prompt_tps_qwen3_6_35b_a3b.svg benchmarks/generation_tps_qwen3_6_35b_a3b.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update benchmark history [skip ci]"
            git push
          fi
